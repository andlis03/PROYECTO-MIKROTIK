{% extends 'base.html' %}

{% block content_page %}
    <div class="card">
        <div class="card-header">
            <span class="h3">Registrar nuevo pago</span>

        </div>
        <div class="card-body">
            <span class="h5 text-danger">{{ error }}</span>
            <hr>
            <form action="{% url 'crear_pago' cliente.id %}" method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">Registrar pago</button>
                <a href="{% url 'gestion_pagos' %}" class="btn btn-primary">Volver</a>
            </form>
        </div>
    </div>
{% endblock %}
