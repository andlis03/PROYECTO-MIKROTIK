{% extends 'base.html' %}

{% block title %}Registrar Nuevo Cliente{% endblock %}

{% block content_page %}
    <div class="card">
        <div class="card-header">
            <span class="h3">Registrar nuevo cliente</span>
        </div>
        <div class="card-body">
            {% if error %}
                <span class="h5 text-danger">{{ error }}</span>
                <hr>
            {% endif %}
            
            <form action="{% url 'crear_cliente' %}" method="post">
                {% csrf_token %}
                
                {{ form.as_p }}
                
                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">Registrar cliente</button>
                    
                    <a href="{% url 'gestion_clientes'%}" class="btn btn-secondary">Volver</a>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
